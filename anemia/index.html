<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貧血判讀 · MCV 決策樹</title>
<style>
  :root{
    --bg:#070a0d;--ink:#e7f3ee;--muted:#7f9489;--ghost:#46584f;--accent:#2bd07a;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --sans:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:740px;margin:0 auto;padding:24px 18px 56px}
  h1{font-size:19px;font-weight:700;margin:0}
  .sub{font-size:12.5px;color:var(--muted);margin:4px 0 0;line-height:1.6}
  .sub a{color:#5fd8ac;text-decoration:none}

  .crumbs{display:flex;flex-wrap:wrap;gap:6px;margin:18px 0 4px;font-family:var(--mono);font-size:11.5px}
  .crumb{background:#0c1217;border:1px solid #182530;color:var(--muted);padding:4px 9px;border-radius:6px;cursor:pointer;transition:.15s}
  .crumb:hover{border-color:#2a3a44;color:var(--ink)}
  .crumb.cur{color:var(--ink);border-color:#27513c;background:#13211b;cursor:default}
  .crumb .arr{color:#3a4a44;margin-right:6px}

  .qcard{margin-top:16px;background:#0c1217;border:1px solid #182530;border-radius:14px;padding:22px 20px}
  .qhint{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;margin:0 0 8px}
  .q{font-size:21px;font-weight:700;margin:0 0 18px;line-height:1.4}
  .opts{display:grid;gap:10px}
  .opt{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:#0a0f14;border:1px solid #18242d;
    color:#cdded6;border-radius:10px;padding:14px 16px;font-size:14.5px;font-family:var(--sans);cursor:pointer;transition:.15s;line-height:1.45}
  .opt:hover{border-color:var(--accent);color:var(--ink);transform:translateX(2px)}
  .opt:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .opt .ico{flex:0 0 auto;font-family:var(--mono);font-size:16px;color:var(--accent)}

  .nav{display:flex;gap:10px;margin-top:18px}
  .nav button{font-family:var(--mono);font-size:12.5px;padding:9px 15px;border-radius:8px;cursor:pointer;
    background:#0c1217;border:1px solid #182530;color:var(--muted);transition:.15s}
  .nav button:hover{border-color:#2a3a44;color:var(--ink)}
  .nav button:disabled{opacity:.35;cursor:default}

  .result .qhint{color:var(--accent)}
  .dxs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .dx{font-size:15px;font-weight:700;color:#06120c;background:var(--accent);padding:7px 13px;border-radius:8px}
  .tip{font-size:13.5px;line-height:1.7;color:#aebcb4;margin:0 0 16px}
  .nexthead{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--muted);margin:0 0 8px}
  .nx{list-style:none;margin:0;padding:0}
  .nx li{font-size:13.5px;color:#9fb1a8;padding:6px 0 6px 16px;position:relative;line-height:1.55;border-top:1px solid #131d22}
  .nx li:first-child{border-top:none}
  .nx li:before{content:"▸";position:absolute;left:0;color:var(--accent)}

  footer{margin-top:26px;font-size:11.5px;color:#465751;line-height:1.7}
  footer a{color:#5a6d65}
</style>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#070a0d">
<link rel="icon" href="/icon-192.png" type="image/png">
</head>
<body>
<div class="wrap">
  <header>
    <h1>貧血判讀 · MCV 決策樹</h1>
    <p class="sub">已確認貧血後,依 MCV(小球 / 正球 / 大球)循線找病因與下一步檢查。資料對照見 <a href="../labs/">實驗室檢查</a>。</p>
  </header>

  <div class="crumbs" id="crumbs"></div>
  <div id="node"></div>

  <div class="nav">
    <button id="back">← 上一步</button>
    <button id="reset">↻ 重新開始</button>
  </div>

  <footer>
    教學示意用,為簡化決策樹;實際貧血鑑別須結合抹片、鐵相關、網狀紅血球、B12/葉酸等綜合判讀。<br>
    <a href="../">← 返回總覽</a> · <a href="../labs/">實驗室檢查</a> · <a href="../flow/">心電圖判讀</a> · <a href="../abg/">ABG 判讀</a>
    <span style="color:#3a4842;font-family:ui-monospace,monospace;font-size:11px;">本頁最後 review:2026-06-13</span>
  </footer>
</div>

<script>
const TREE={
  start:{hint:'Step 1 · 看 MCV',q:'已確認貧血(Hb 偏低),MCV 落在?',opts:[
    {l:'MCV < 80(小球性 microcytic)',crumb:'小球 < 80',go:'q_micro'},
    {l:'MCV 80–100(正球性 normocytic)',crumb:'正球 80–100',go:'q_normo'},
    {l:'MCV > 100(大球性 macrocytic)',crumb:'大球 > 100',go:'q_macro'},
  ]},
  q_micro:{hint:'Step 2 · 小球性 → 看鐵相關',q:'鐵蛋白(ferritin)與鐵相關檢查?',opts:[
    {l:'ferritin 低、TIBC 高、transferrin sat 低',crumb:'鐵↓',go:'leaf_ida'},
    {l:'ferritin 正常或高、TIBC 低 / 正常(常見慢性病)',crumb:'鐵正常/高',go:'leaf_acd'},
    {l:'鐵正常、有家族史、RBC 數不低、電泳異常',crumb:'鐵正常+家族史',go:'leaf_thal'},
  ]},
  q_normo:{hint:'Step 2 · 正球性 → 看網狀紅血球',q:'網狀紅血球(reticulocyte)反應?',opts:[
    {l:'升高(> 2–3%,骨髓有反應)',crumb:'網狀↑',go:'q_normo_hi'},
    {l:'正常或偏低(生成不足)',crumb:'網狀↓',go:'leaf_hypo'},
  ]},
  q_normo_hi:{hint:'Step 3 · 網狀↑ → 失血 vs 溶血',q:'有出血證據,或溶血指標(↑LDH、↑間接膽紅素、↓haptoglobin)?',opts:[
    {l:'近期 / 持續出血',crumb:'出血',go:'leaf_bleed'},
    {l:'溶血指標陽性',crumb:'溶血',go:'leaf_hemo'},
  ]},
  q_macro:{hint:'Step 2 · 大球性 → 是否巨母紅血球性',q:'抹片是否見過度分葉嗜中性球(hypersegmented)等巨母變化?',opts:[
    {l:'是(巨母紅血球性 megaloblastic)',crumb:'巨母',go:'leaf_megalo'},
    {l:'否(非巨母 non-megaloblastic)',crumb:'非巨母',go:'leaf_nonmeg'},
  ]},

  leaf_ida:{leaf:true,dx:['缺鐵性貧血 (IDA)'],
    tip:'小球低色素;ferritin 低是最特異指標(但 ferritin 為急性期蛋白,發炎時可假性正常)。',
    next:['積極找失血源(腸胃道、月經)','補鐵並追蹤反應(網狀紅血球上升、Hb 回升)']},
  leaf_acd:{leaf:true,dx:['慢性病貧血 (ACD)'],
    tip:'ferritin 正常 / 高、TIBC 低;多為輕度小球或正球性。',
    next:['治療潛在慢性病 / 發炎','與 IDA 鑑別:transferrin sat、可溶性運鐵蛋白受體']},
  leaf_thal:{leaf:true,dx:['地中海貧血 (thalassemia)'],
    tip:'RBC 數常不低、RDW 多正常,MCV 偏低程度與貧血不成比例。',
    next:['血紅素電泳(HbA2、HbF)','家族檢查;避免誤當 IDA 長期補鐵']},
  leaf_hypo:{leaf:true,dx:['生成不足型正球性貧血'],
    tip:'網狀紅血球低 → 骨髓生成不足。',
    next:['想:慢性病貧血、腎性貧血(EPO↓)、早期缺鐵','骨髓抑制 / 再生不良、骨髓浸潤 → 必要時骨髓檢查']},
  leaf_bleed:{leaf:true,dx:['急性失血'],
    tip:'網狀紅血球代償性上升;急性期 MCV 仍可正常。',
    next:['找出血源並止血','評估輸血需求、追蹤 Hb 趨勢']},
  leaf_hemo:{leaf:true,dx:['溶血性貧血'],
    tip:'↑LDH、↑間接膽紅素、↓haptoglobin、網狀紅血球↑。',
    next:['Coombs test 分免疫性 vs 非免疫性','抹片找型態:球形球(spherocyte)、裂片細胞(schistocyte → MAHA)']},
  leaf_megalo:{leaf:true,dx:['維生素 B12 缺乏','葉酸缺乏'],
    tip:'巨母紅血球性:過度分葉嗜中性球、MCV 常明顯升高。',
    next:['驗 B12、folate','B12 缺乏找病因(惡性貧血、吸收不良);補葉酸前先確認 B12 以免遮蔽神經病變']},
  leaf_nonmeg:{leaf:true,dx:['非巨母大球性'],
    tip:'無巨母變化。',
    next:['想:酒精、肝病、甲狀腺功能低下、MDS','溶血 / 失血恢復期網狀紅血球大量增加可造成假性大球']},
};

let hist=[{node:'start',crumb:'開始'}];
const $=id=>document.getElementById(id);

function render(){
  const n=TREE[hist[hist.length-1].node];
  $('crumbs').innerHTML=hist.map((h,i)=>{const last=i===hist.length-1;
    return `<span class="crumb${last?' cur':''}" data-i="${i}">${i?'<span class="arr">▸</span>':''}${h.crumb}</span>`;}).join('');
  if(n.leaf)renderLeaf(n);else renderQuestion(n);
  $('back').disabled=hist.length<=1;
}
function renderQuestion(n){
  $('node').className='';
  $('node').innerHTML=`<div class="qcard"><p class="qhint">${n.hint}</p><p class="q">${n.q}</p>
    <div class="opts">${n.opts.map(o=>`<button class="opt" data-go="${o.go}" data-crumb="${o.crumb}"><span class="ico">▸</span><span>${o.l}</span></button>`).join('')}</div></div>`;
}
function renderLeaf(n){
  $('node').className='result';
  $('node').innerHTML=`<div class="qcard result"><p class="qhint">判讀方向</p>
    <div class="dxs">${n.dx.map(d=>`<span class="dx">${d}</span>`).join('')}</div>
    <p class="tip">${n.tip}</p>
    <p class="nexthead">下一步</p>
    <ul class="nx">${n.next.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
}

$('node').addEventListener('click',e=>{const b=e.target.closest('.opt');if(!b)return;
  hist.push({node:b.dataset.go,crumb:b.dataset.crumb});render();});
$('crumbs').addEventListener('click',e=>{const c=e.target.closest('.crumb');if(!c)return;
  const i=+c.dataset.i;if(i<hist.length-1){hist=hist.slice(0,i+1);render();}});
$('back').addEventListener('click',()=>{if(hist.length>1){hist.pop();render();}});
$('reset').addEventListener('click',()=>{hist=[{node:'start',crumb:'開始'}];render();});
render();
</script>
<script>if("serviceWorker" in navigator){addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}))}</script>
<script data-goatcounter="https://iameric6411.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
