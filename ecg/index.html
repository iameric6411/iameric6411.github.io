<div class="wrap">
  <header>

  <div class="tabs" id="tabs">

      <input type="range" id="slider" min="1.5" max="9.0" step="0.1" value="4.2">

<script>
const cv=document.getElementById('ecg'),ctx=cv.getContext('2d');
const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const W=cv.width,H=cv.height,baseY=H*0.58,gain=H*0.30;
const clamp=(x,a,b)=>Math.max(a,Math.min(b,x));
const gauss=(t,c,w,a)=>{const d=(t-c)/w;return a*Math.exp(-0.5*d*d);};
const smooth=(e0,e1,x)=>{const t=clamp((x-e0)/(e1-e0),0,1);return t*t*(3-2*t);};
const plateau=(p,a,b,lv)=>lv*smooth(a-0.02,a+0.02,p)*(1-smooth(b-0.02,b+0.02,p));

function normalP(){return{pAmp:1,prShift:0,qrsW:1,rAmp:1,stLevel:0,tAmp:0.30,tCenter:0.62,tWidth:0.045,uAmp:0.04,uCenter:0.80,sineBlend:0,osborn:0,hr:75};}

// one cardiac cycle, phase p in [0,1)
function beat(p,P){
  let v=0;
  v+=gauss(p,0.16,0.030,0.16*P.pAmp);
  v+=plateau(p,0.42,Math.max(P.tCenter-0.07,0.44),P.stLevel);
  v+=gauss(p,0.34+P.prShift,0.010*P.qrsW,-0.10);
  v+=gauss(p,0.37+P.prShift,0.015*P.qrsW, 1.0*P.rAmp);
  v+=gauss(p,0.40+P.prShift,0.013*P.qrsW,-0.22);
  if(P.osborn)v+=gauss(p,0.435+P.prShift,0.016,P.osborn);
  v+=gauss(p,P.tCenter,Math.max(P.tWidth,0.03)*Math.max(1,P.qrsW*0.7),P.tAmp);
  if(P.uAmp)v+=gauss(p,P.uCenter,0.05,P.uAmp);
  if(P.sineBlend>0){const s=Math.sin((p-0.30)*2*Math.PI)*0.62;v=v*(1-P.sineBlend)+s*P.sineBlend;}
  return v;
}

// ---- ion configs ----------------------------------------------------
const CFG={
  K:{label:'血鉀',ek:'K⁺',unit:'mEq/L',min:1.5,max:9.0,step:0.1,def:4.2,normal:[3.5,5.0],
    ticks:[1.5,3.5,5.0,9.0],
    params(v){const P=normalP();
      if(v>5.0){P.pAmp=clamp((7.4-v)/2.0,0,1);P.prShift=clamp((v-6)*0.012,0,0.05);
        P.qrsW=1+Math.max(0,v-6)*0.85;P.rAmp=1-Math.max(0,v-7)*0.18;
        P.tAmp=0.30+Math.max(0,v-5)*0.30;P.tWidth=0.045-clamp(v-5,0,2.5)*0.006;
        P.tCenter=0.60;P.uAmp=0;P.sineBlend=clamp((v-7.7)/1.1,0,1);P.hr=v>8?52:v>7?64:75;}
      else if(v<3.5){const d=3.5-v;P.tAmp=clamp(0.30-d*0.16,0.03,0.30);
        P.stLevel=-clamp(3.2-v,0,1.2)*0.075;P.uAmp=clamp(d*0.11,0,0.26);
        P.pAmp=1+clamp(d*0.08,0,0.18);P.prShift=clamp(d*0.006,0,0.02);P.tCenter=0.63;}
      return P;},
    feats:[
      {l:'高聳尖銳 T 波 (tented T)',on:v=>v>=5.4},
      {l:'P 波平坦 → 消失',on:v=>v>=6.5},
      {l:'QRS 增寬',on:v=>v>=6.8},
      {l:'Sine wave(正弦波)',on:v=>v>=7.9},
      {l:'T 波低平 / ST 壓低',on:v=>v<=3.2},
      {l:'U 波明顯 (U≥T)',on:v=>v<=2.7},
    ],
    stages:[
      {max:2.5,c:'#ff3b53',pill:'危急',name:'嚴重低血鉀',
        desc:'明顯 U 波(U≥T)、ST 壓低、QT/QU 延長,心室易激,易誘發 torsades／室性心律不整。',
        mgmt:'靜脈補充 KCl(限速,避免心律不整)、同時矯正低血鎂、持續心電監測。'},
      {max:3.0,c:'#ff7a3c',pill:'中度',name:'中度低血鉀',
        desc:'T 波低平、ST 壓低、U 波漸明顯。',mgmt:'口服或靜脈補鉀,並找病因(利尿劑、嘔吐腹瀉、低血鎂)。'},
      {max:3.5,c:'#f5c042',pill:'輕度',name:'輕度低血鉀',
        desc:'T 波變平、U 波開始出現,常無明顯症狀。',mgmt:'口服 KCl 補充、追蹤電解質。'},
      {max:5.5,c:'#2bd07a',pill:'正常',name:'正常範圍',
        desc:'心電圖正常;血鉀略高時可能僅見高聳對稱 T 波。',mgmt:'例行監測即可。'},
      {max:6.5,c:'#f5c042',pill:'輕中度',name:'輕至中度高血鉀',
        desc:'典型高聳、基底窄、對稱的帳篷狀 T 波,PR 間期可能延長。',mgmt:'降鉀治療(insulin + glucose、利尿劑、Kayexalate 樹脂)、持續心電監測。'},
      {max:7.7,c:'#ff7a3c',pill:'中重度',name:'中至重度高血鉀',
        desc:'P 波變平甚至消失、QRS 增寬,傳導全面受抑。',mgmt:'緊急:先給 IV calcium gluconate 穩定心肌細胞膜,合併 insulin + glucose、nebulized β2 agonist 降鉀,並安排透析移除鉀離子。'},
      {max:99,c:'#ff3b53',pill:'危急',name:'危急 · Sine wave',
        desc:'增寬 QRS 與 T 波融合成正弦波,為 VF／心搏停止前兆。',mgmt:'立即給 IV calcium gluconate,同時積極降鉀(insulin + glucose、β2 agonist、Kayexalate),準備緊急透析與 ACLS。'},
    ]},
  Ca:{label:'血鈣',ek:'Ca²⁺',unit:'mg/dL',min:5.0,max:16.0,step:0.1,def:9.5,normal:[8.5,10.5],
    ticks:[5.0,8.5,10.5,16.0],
    params(v){const P=normalP();
      if(v>10.5){const d=v-10.5;P.tCenter=clamp(0.62-d*0.034,0.50,0.62);
        P.osborn=clamp((v-14)/2,0,1)*0.16;P.hr=v>14.5?58:75;}
      else if(v<8.5){const d=8.5-v;P.tCenter=clamp(0.62+d*0.050,0.62,0.84);P.tAmp=0.28;}
      return P;},
    feats:[
      {l:'QT 間期縮短(ST 段變短)',on:v=>v>=11},
      {l:'心搏過緩 / AV block',on:v=>v>=14},
      {l:'極嚴重時可進展心搏停止',on:v=>v>=14.5},
      {l:'QT 間期延長(ST 段拉長)',on:v=>v<=8.0},
      {l:'Torsades 風險',on:v=>v<=6.5},
    ],
    stages:[
      {max:7.0,c:'#ff3b53',pill:'危急',name:'嚴重低血鈣',
        desc:'明顯 QT 間期延長(ST 段拉長),torsades 風險;可伴 Chvostek／Trousseau 徵象。',mgmt:'靜脈給予 calcium gluconate、矯正低血鎂(常為共同病因)、監測 QT。'},
      {max:8.5,c:'#f5c042',pill:'輕中度',name:'低血鈣',
        desc:'QT 間期延長,T 波多半維持正常形狀但被往後推。',mgmt:'口服或靜脈補鈣,並找病因(腎臟病、副甲狀腺功能低下、維生素 D 不足)。'},
      {max:10.5,c:'#2bd07a',pill:'正常',name:'正常範圍',desc:'QT 間期正常。',mgmt:'例行監測即可。'},
      {max:12.0,c:'#f5c042',pill:'輕度',name:'輕度高血鈣',
        desc:'QT 間期縮短(ST 段變短),T 波幾乎緊接 QRS。',mgmt:'找病因(原發性副甲狀腺亢進、惡性腫瘤),並給予 IV normal saline 輸液以促進腎臟排鈣。'},
      {max:14.0,c:'#ff7a3c',pill:'中度',name:'中度高血鈣',
        desc:'QT 明顯縮短。',mgmt:'積極給予 IV normal saline 輸液,必要時加 loop diuretic(如 furosemide)促進排鈣,並考慮 bisphosphonate 或 calcitonin。'},
      {max:99,c:'#ff3b53',pill:'危急',name:'嚴重高血鈣',
        desc:'極短 QT;心搏過緩、AV block 可能出現,極嚴重時可進展為心搏停止。',mgmt:'緊急降鈣治療(bisphosphonate、calcitonin、積極輸液 ± 利尿),並處理心律不整,必要時安排透析。'},
    ]},
};

// ---- state & helpers ------------------------------------------------
let ion='K',val=CFG.K.def,P=CFG.K.params(val),refP=normalP(),paused=false;
let trace=new Float32Array(W).fill(baseY),tref=new Float32Array(W).fill(baseY);
let x=0,phase=0,last=performance.now();

function stageFor(c,v){return c.stages.find(s=>v<s.max)||c.stages[c.stages.length-1];}
function gradient(c){const r=c.max-c.min;let prev=c.min,st=[];
  c.stages.forEach(s=>{const end=Math.min(s.max,c.max);
    st.push(`${s.c} ${((prev-c.min)/r*100).toFixed(1)}% ${((end-c.min)/r*100).toFixed(1)}%`);prev=end;});
  return`linear-gradient(90deg,${st.join(',')})`;}

function drawGrid(){
  ctx.fillStyle='#050807';ctx.fillRect(0,0,W,H);ctx.lineWidth=1;
  ctx.strokeStyle=cssv('--grid');ctx.beginPath();
  for(let gx=0;gx<W;gx+=20){ctx.moveTo(gx,0);ctx.lineTo(gx,H);}
  for(let gy=0;gy<H;gy+=20){ctx.moveTo(0,gy);ctx.lineTo(W,gy);}ctx.stroke();
  ctx.strokeStyle=cssv('--grid-strong');ctx.beginPath();
  for(let gx=0;gx<W;gx+=100){ctx.moveTo(gx,0);ctx.lineTo(gx,H);}
  for(let gy=0;gy<H;gy+=100){ctx.moveTo(0,gy);ctx.lineTo(W,gy);}ctx.stroke();
}
const cssv=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const showRef=()=>document.getElementById('refToggle').checked;

function strokeBuf(buf,color,width,glow,gap,cur){
  ctx.lineJoin='round';ctx.lineCap='round';ctx.strokeStyle=color;ctx.lineWidth=width;
  ctx.shadowColor=color;ctx.shadowBlur=glow;ctx.beginPath();let started=false;
  for(let i=0;i<W;i++){
    if(gap&&i>=cur&&i<cur+26){started=false;continue;}
    if(!started){ctx.moveTo(i,buf[i]);started=true;}else ctx.lineTo(i,buf[i]);
  }
  ctx.stroke();ctx.shadowBlur=0;
}

function renderScreen(cur){
  drawGrid();
  if(showRef())strokeBuf(tref,cssv('--ghost'),2,0,true,cur);
  strokeBuf(trace,stageFor(CFG[ion],val).c,2.4,9,true,cur);
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.fillRect(cur,0,2,H);
}

// animated sweep
function frame(now){
  const dt=Math.min((now-last)/1000,0.05);last=now;
  if(!paused){
    const bps=P.hr/60,pxs=W*0.42,adv=pxs*dt;
    for(let i=0;i<adv;i++){
      phase+=bps/pxs;if(phase>=1)phase-=1;
      const xi=Math.floor(x)%W;
      trace[xi]=baseY-beat(phase,P)*gain;
      tref[xi]=baseY-beat(phase,refP)*gain;
      x+=1;if(x>=W)x=0;
    }
    renderScreen(Math.floor(x));
  }
  requestAnimationFrame(frame);
}
// static (reduced motion): 4 beats across width
function drawStatic(){
  const beats=4;for(let i=0;i<W;i++){const ph=(i/(W/beats))%1;
    trace[i]=baseY-beat(ph,P)*gain;tref[i]=baseY-beat(ph,refP)*gain;}
  renderScreen(-99);
}

// ---- UI render ------------------------------------------------------
function buildFeatures(){
  const ul=document.getElementById('feat');ul.innerHTML='';
  CFG[ion].feats.forEach(f=>{const li=document.createElement('li');
    li.innerHTML=`<span class="dot"></span><div>${f.l}</div>`;li._on=f.on;ul.appendChild(li);});
}
function setIon(i){
  ion=i;const c=CFG[i];
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.ion===i));
  const s=document.getElementById('slider');
  s.min=c.min;s.max=c.max;s.step=c.step;s.value=c.def;
  s.style.background=gradient(c);
  const bv=document.getElementById('bigVal');
  bv.min=c.min;bv.max=c.max;bv.step=c.step;
  document.getElementById('ticks').innerHTML=c.ticks.map(t=>`<span>${t.toFixed(1)}</span>`).join('');
  document.getElementById('ionTitle').textContent=c.label+'濃度';
  document.getElementById('bigUnit').textContent=c.unit;
  document.getElementById('hudUnit').textContent=`${c.ek} ${c.unit}`;
  document.getElementById('nrange').textContent=`正常範圍 ${c.normal[0]}–${c.normal[1]} ${c.unit}`;
  buildFeatures();setVal(c.def);
}
function setVal(v){
  const c=CFG[ion];
  if(isNaN(v))return;
  if(v<c.min)v=c.min;if(v>c.max)v=c.max;
  val=v;P=c.params(v);refP=normalP();
  const st=stageFor(c,v);
  document.getElementById('slider').value=v.toFixed(1);
  document.getElementById('bigVal').value=v.toFixed(1);
  document.getElementById('hudVal').textContent=v.toFixed(1);
  document.getElementById('hudVal').style.color=st.c;
  document.getElementById('liveSwatch').style.background=st.c;
  document.getElementById('hr').textContent='HR '+P.hr;
  const tag=document.getElementById('stageTag');tag.textContent=st.name;tag.style.color=st.c;
  const pill=document.getElementById('pill');pill.textContent=st.pill;
  pill.style.background=st.c+'22';pill.style.color=st.c;
  document.getElementById('stageName').textContent=st.name;
  document.getElementById('stageDesc').textContent=st.desc;
  document.getElementById('mgmt').textContent='處置 ▸ '+st.mgmt;
  document.getElementById('stageBox').style.borderColor=st.c+'55';
  document.querySelectorAll('#feat li').forEach(li=>{
    const on=li._on(v);li.classList.toggle('on',on);li.style.setProperty('--cl',st.c);});
  document.getElementById('ecg').setAttribute('aria-label',
    `${c.label} ${v.toFixed(1)} ${c.unit}(${st.name}):${st.desc.replace(/<[^>]+>/g,'')}`);
  if(reduce)drawStatic();
}

document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('.tab');if(b)setIon(b.dataset.ion);});
document.getElementById('slider').addEventListener('input',e=>setVal(parseFloat(e.target.value)));
document.getElementById('bigVal').addEventListener('input',e=>{const v=parseFloat(e.target.value);if(!isNaN(v))setVal(v);});
document.getElementById('refToggle').addEventListener('change',()=>{if(reduce)drawStatic();});
cv.addEventListener('click',()=>{paused=!paused;document.getElementById('pause').style.display=paused?'flex':'none';});

// deep-link: ecg/#K 或 ecg/#Ca 可直接選定離子(供 lab 檢驗頁連入)
const fromHash=()=>{const h=decodeURIComponent(location.hash.slice(1));return CFG[h]?h:null;};
window.addEventListener('hashchange',()=>{const i=fromHash();if(i)setIon(i);});

drawGrid();setIon(fromHash()||'K');
if(reduce)drawStatic();else requestAnimationFrame(frame);
</script>
