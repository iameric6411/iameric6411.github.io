<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>互動教材總覽</title>
<style>
  :root{
    --bg:#070a0d;--card:#0c1217;--border:#182530;
    --ink:#e7f3ee;--muted:#7f9489;
    --sans:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  .wrap{max-width:760px;margin:0 auto;padding:40px 18px 56px}
  h1{font-size:20px;font-weight:700;letter-spacing:.3px;margin:0 0 6px}
  .sub{font-size:13px;color:var(--muted);margin:0 0 28px}
  .grid{display:grid;gap:14px}
  a.card{display:block;background:var(--card);border:1px solid var(--border);border-radius:12px;
    padding:16px 18px;text-decoration:none;color:var(--ink);transition:.18s border-color}
  a.card:hover{border-color:#27513c}
  .card .name{font-size:15px;font-weight:700;margin:0 0 4px}
  .card .desc{font-size:12.5px;color:var(--muted);margin:0}
  footer{margin-top:32px;font-size:11.5px;color:#465751;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>互動教材總覽</h1>
    <p class="sub">點選下方項目進入各互動教材</p>
  </header>

  <div class="grid">
    <a class="card" href="ecg/">
      <p class="name">電解質心電圖對照模擬器</p>
      <p class="desc">切換離子（K⁺ / Ca²⁺）、拖動濃度，觀察波形由低 → 正常 → 高的連續變化</p>
    </a>
    <a class="card" href="acls/">
      <p class="name">ACLS 心律辨識對照頁</p>
      <p class="desc">依急救演算法分四類（可電擊 / 不可電擊 / 心搏過緩 / 心搏過速），點選任一節律即時描繪波形與處置重點</p>
    </a>
  </div>

  <footer>
    本站內容為教學示意用，非真實臨床描記，臨床判讀請以真實數據為準。
  </footer>
</div>
</body>
</html>
